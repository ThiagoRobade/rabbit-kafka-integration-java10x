version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ms-email-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_email_ms
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata: